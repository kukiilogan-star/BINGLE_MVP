            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Nunito', 'Nunito Sans', sans-serif;
            background-color: #fff8f5;
        }
        .comic-panel {
            border: 2px solid #56423d;
            box-shadow: 4px 4px 0px 0px rgba(86, 66, 61, 0.1);
            transition: transform 0.2s ease-out;
        }
        .speech-bubble {
            position: absolute;
            background: white;
            border: 2px solid #56423d;
            border-radius: 1.5rem;
            padding: 0.75rem 1rem;
            filter: drop-shadow(2px 2px 0px rgba(86, 66, 61, 0.1));
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #56423d;
        }
        .speech-bubble-inner::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 21px;
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 9px solid white;
        }
        .squishy-button {
            box-shadow: 0 4px 0 0 #7e2b10;
            transition: all 0.1s ease-out;
        }
        .squishy-button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 #7e2b10;
        }
    </style>
